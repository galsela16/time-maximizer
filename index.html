<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משבצת — מקסום הזמן שלך</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#524B63;
    --ink-deep:#413A50;
    --bg-a:#FDF1EF;
    --bg-b:#F1EFFB;
    --bg-c:#F7F5FC;
    --card:#FFFFFF;
    --paper-line:#EFE9F5;
    --accent:#F0A98D;
    --accent-dark:#DE8A6C;
    --accent-light:#FCE8E0;
    --work:#8FB0D6;
    --work-light:#EAF1FA;
    --home:#E5A0AC;
    --home-light:#FBEBEE;
    --sleep:#A79BCB;
    --blocked:#BDB6C9;
    --blocked-light:#F0ECF6;
    --free:#9BCFAE;
    --text-dark:#4A4458;
    --text-mid:#948CA3;
    --text-light:#BDB6C9;
    --danger:#DE8477;
    --danger-bg:#FCEDE9;
    --danger-border:#F3CCC1;
    --danger-text:#A8574A;
    --radius:20px;
    --radius-sm:13px;
    --shadow-sm:0 2px 10px rgba(120,100,150,0.07);
    --shadow-md:0 14px 34px rgba(120,100,150,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(150deg, var(--bg-a) 0%, var(--bg-c) 45%, var(--bg-b) 100%);
    background-attachment:fixed;
    color:var(--text-dark);
    font-family:'Rubik',Arial,sans-serif;
    font-size:15px;
    line-height:1.55;
  }
  h1,h2,h3,.display{
    font-family:'Rubik', Arial, sans-serif;
    color:var(--ink);
    font-weight:600;
  }
  #app{max-width:900px;margin:0 auto;padding-bottom:60px;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(6px);}
    to{opacity:1;transform:translateY(0);}
  }
  .step-panel{animation:fadeUp .32s ease both;}

  /* Header */
  .app-header{
    background:linear-gradient(120deg, var(--bg-a) 0%, var(--bg-b) 100%);
    color:var(--ink);
    padding:30px 30px 26px;
    margin:18px 18px 0;
    border-radius:26px;
    box-shadow:var(--shadow-sm);
  }
  .app-header .eyebrow{
    font-size:11.5px;
    letter-spacing:2.5px;
    color:var(--accent-dark);
    text-transform:uppercase;
    margin-bottom:6px;
    font-weight:600;
  }
  .app-header h1{
    color:var(--ink);
    font-size:30px;
    margin:0 0 6px;
    font-weight:700;
  }
  .app-header p{
    color:var(--text-mid);
    margin:0;
    max-width:600px;
    font-size:13.5px;
  }

  .container{padding:22px 24px 8px;}

  /* Stepper */
  .stepper{
    display:flex;
    gap:8px;
    margin-bottom:22px;
  }
  .step-tab{
    flex:1;
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:#fff;
    border:1px solid var(--paper-line);
    border-radius:999px;
    padding:11px 10px;
    cursor:pointer;
    font-weight:600;font-size:13px;color:var(--text-mid);
    transition:background .15s,color .15s,border-color .15s;
  }
  .step-tab .num{
    width:20px;height:20px;border-radius:50%;
    background:var(--paper-line);color:var(--text-mid);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;flex-shrink:0;
  }
  .step-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .step-tab.active .num{background:#fff;color:var(--accent-dark);}
  .step-tab.done .num{background:var(--work);color:#fff;}
  .step-tab:hover:not(.active){border-color:var(--text-light);}

  .card{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:var(--radius);
    padding:24px 26px;
    box-shadow:var(--shadow-sm);
  }
  .card h2{font-size:19px;margin:0 0 4px;}
  .card .sub{color:var(--text-mid);font-size:13px;margin:0 0 16px;}

  .stat-line{
    display:flex;gap:16px;flex-wrap:wrap;
    background:var(--bg-c);
    border:1px solid var(--paper-line);
    border-radius:var(--radius-sm);
    padding:10px 16px;
    margin-bottom:16px;
    font-size:12.5px;
    color:var(--text-mid);
  }
  .stat-line b{color:var(--ink);font-weight:700;}

  /* list */
  .item-row{
    display:flex;align-items:center;gap:12px;
    padding:11px 14px;
    border:1px solid var(--paper-line);
    border-radius:var(--radius-sm);
    margin-bottom:8px;
    background:#FDFCFE;
    transition:box-shadow .15s, transform .15s;
  }
  .item-row:hover{box-shadow:var(--shadow-sm);}
  .item-row .bar{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;}
  .bar-work{background:var(--work);}
  .bar-home{background:var(--home);}
  .bar-blocked{background:var(--blocked);}
  .item-row .type-label{
    font-size:11px;font-weight:700;white-space:nowrap;
    padding:4px 10px;border-radius:20px;color:#fff;flex-shrink:0;
  }
  .item-row .main{flex:1;min-width:0;}
  .item-row .main .name{font-weight:600;font-size:14px;}
  .item-row .main .meta{font-size:12px;color:var(--text-mid);margin-top:1px;}
  .item-row .del{
    border:none;background:none;color:var(--text-light);
    cursor:pointer;font-size:17px;line-height:1;padding:5px 7px;border-radius:8px;flex-shrink:0;
  }
  .item-row .del:hover{color:var(--danger-text);background:var(--danger-bg);}

  .empty-state{
    text-align:center;padding:28px 10px 20px;color:var(--text-light);
  }
  .empty-state .glyph{font-size:26px;margin-bottom:6px;opacity:.6;}
  .empty-state p{margin:0;font-size:13px;}

  /* add details/summary */
  details.add-details{
    margin-top:14px;
    border-top:1px dashed var(--paper-line);
    padding-top:14px;
  }
  details.add-details summary{
    list-style:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
    font-weight:600;font-size:13.5px;color:var(--accent-dark);
    padding:7px 4px;
    user-select:none;
  }
  details.add-details summary::-webkit-details-marker{display:none;}
  details.add-details summary .plusicon{
    width:20px;height:20px;border-radius:50%;background:var(--accent-light);
    color:var(--accent-dark);display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;transition:transform .15s;
  }
  details.add-details[open] summary .plusicon{transform:rotate(45deg);}
  .add-form{padding-top:10px;}

  .field-label{
    display:block;font-size:12px;color:var(--text-mid);margin-bottom:6px;font-weight:600;
  }
  .field{margin-bottom:12px;}
  input[type=text], input[type=number], input[type=time]{
    width:100%;padding:10px 12px;border:1px solid var(--paper-line);border-radius:var(--radius-sm);
    background:#fff;font-family:inherit;font-size:13.5px;color:var(--text-dark);
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.row2{grid-template-columns:1fr;}}

  .pill-group{display:flex;flex-wrap:wrap;gap:7px;}
  .pill{
    padding:8px 15px;border-radius:999px;border:1.5px solid var(--paper-line);
    background:#fff;font-size:13px;font-weight:600;color:var(--text-mid);cursor:pointer;
    transition:all .12s;
  }
  .pill[data-value="עבודה"].active{background:var(--work);border-color:var(--work);color:#fff;}
  .pill[data-value="בית"].active{background:var(--home);border-color:var(--home);color:#fff;}
  .pill[data-value="חסום"].active{background:var(--blocked);border-color:var(--blocked);color:#fff;}
  .pill[data-value="שינה"].active{background:var(--sleep);border-color:var(--sleep);color:#fff;}
  .pill[data-value="גבוהה"].active{background:var(--danger);border-color:var(--danger);color:#fff;}
  .pill[data-value="בינונית"].active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pill[data-value="נמוכה"].active{background:var(--free);border-color:var(--free);color:#fff;}

  .day-picker{display:flex;gap:5px;flex-wrap:wrap;}
  .day-chip{
    min-width:32px;height:32px;padding:0 6px;border-radius:16px;
    border:1px solid var(--paper-line);background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:600;color:var(--text-mid);cursor:pointer;user-select:none;
  }
  .day-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .day-chip.none-chip{font-size:11px;padding:0 10px;}

  .mini-chip{
    padding:5px 10px;border-radius:14px;border:1px solid var(--paper-line);background:#fff;
    font-size:12px;color:var(--text-mid);cursor:pointer;
  }
  .mini-chip:hover{border-color:var(--accent);color:var(--accent-dark);}
  .mini-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}

  .inline-error{color:var(--danger-text);font-size:12.5px;margin:6px 0 0;display:none;}
  .inline-error.show{display:block;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:none;border-radius:var(--radius-sm);
    padding:10px 20px;
    font-weight:600;font-size:13.5px;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn-brass{background:var(--accent);color:#fff;}
  .btn-brass:hover{background:var(--accent-dark);}
  .btn-outline{background:none;border:1px solid var(--paper-line);color:var(--text-dark);}
  .btn-outline:hover{border-color:var(--text-mid);}
  .btn-full{width:100%;margin-top:6px;}
  .btn-ghost{background:none;border:none;color:var(--text-mid);text-decoration:underline;padding:6px 2px;cursor:pointer;font-size:13px;}
  .btn-ghost:hover{color:var(--ink);}

  .step-actions{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:20px;
  }
  .step-actions.single{justify-content:flex-end;}

  /* Results */
  .back-link{margin-bottom:14px;}
  .hero-panel{
    display:grid;grid-template-columns:170px 1fr;gap:26px;align-items:center;
    background:linear-gradient(120deg, var(--bg-a) 0%, var(--bg-b) 100%);
    color:var(--ink);border-radius:var(--radius);
    padding:26px 28px;margin-bottom:22px;box-shadow:var(--shadow-md);
  }
  @media(max-width:600px){.hero-panel{grid-template-columns:1fr;text-align:center;}}
  .dial-wrap{position:relative;width:150px;height:150px;margin:0 auto;}
  .dial{
    width:150px;height:150px;border-radius:50%;
    box-shadow:0 0 0 5px rgba(255,255,255,0.55) inset, 0 10px 22px rgba(140,120,160,0.22);
  }
  .dial-hole{
    position:absolute;top:17px;left:17px;right:17px;bottom:17px;
    background:#fff;border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:var(--shadow-sm);
  }
  .dial-hole .num{font-family:'Rubik',sans-serif;font-size:28px;font-weight:700;color:var(--accent-dark);line-height:1;}
  .dial-hole .lbl{font-size:10px;color:var(--text-mid);margin-top:4px;text-align:center;}
  .hero-text h3{color:var(--ink);font-size:19px;margin:0 0 7px;}
  .hero-text p{color:var(--text-mid);font-size:13px;margin:0 0 13px;max-width:520px;}
  .legend{display:flex;flex-wrap:wrap;gap:13px;}
  .legend .li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-mid);}
  .legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .unscheduled-warn{
    background:var(--danger-bg);border:1px solid var(--danger-border);color:var(--danger-text);
    border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;margin-bottom:18px;
  }
  .unscheduled-warn strong{display:block;margin-bottom:4px;}

  .tabs{display:flex;gap:6px;margin-bottom:14px;}
  .tab-btn{
    padding:8px 18px;border-radius:20px;border:1px solid var(--paper-line);
    background:#fff;font-weight:600;font-size:13px;cursor:pointer;color:var(--text-mid);
  }
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .cal-scroll{
    max-height:560px;overflow-y:auto;overflow-x:auto;
    border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow-sm);
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7, minmax(88px,1fr)) 44px;position:relative;min-width:660px;}
  .cal-head{
    display:grid;grid-template-columns:repeat(7, minmax(88px,1fr)) 44px;
    position:sticky;top:0;background:#fff;z-index:3;border-bottom:1px solid var(--paper-line);min-width:660px;
  }
  .cal-head .d{
    text-align:center;padding:9px 2px;font-weight:700;font-size:12px;color:var(--ink);
    border-right:1px solid var(--paper-line);
  }
  .day-col{position:relative;border-right:1px solid var(--paper-line);}
  .axis-col{position:relative;}
  .axis-label{
    position:absolute;right:0;left:0;text-align:center;font-size:9px;color:var(--text-light);
    transform:translateY(-6px);
  }
  .hour-line{position:absolute;left:0;right:0;border-top:1px solid var(--paper-line);}
  .block{position:absolute;left:3%;right:3%;border-radius:6px;font-size:10px;padding:2px 5px;overflow:hidden;line-height:1.25;}
  .block-blocked{background:repeating-linear-gradient(45deg, var(--blocked-light), var(--blocked-light) 5px, #E3DCEE 5px, #E3DCEE 10px);color:var(--text-mid);font-weight:600;opacity:.75;}
  .block-work-window{background:var(--work-light);opacity:.6;}
  .block-home-window{background:var(--home-light);opacity:.6;}
  .block-task{color:#fff;font-weight:600;left:6%;right:6%;box-shadow:0 2px 6px rgba(120,100,150,0.18);z-index:2;}
  .block-task.work{background:var(--work);}
  .block-task.home{background:var(--home);}

  .gantt{border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff;padding:16px 18px;box-shadow:var(--shadow-sm);}
  .gantt-head{display:grid;grid-template-columns:150px 1fr;gap:10px;margin-bottom:6px;}
  .gantt-daylabels{display:grid;grid-template-columns:repeat(7,1fr);}
  .gantt-daylabels span{text-align:center;font-size:10.5px;color:var(--text-mid);font-weight:700;}
  .gantt-row{display:grid;grid-template-columns:150px 1fr;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--paper-line);}
  .gantt-row:last-child{border-bottom:none;}
  .gantt-label{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .gantt-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .gantt-track{
    position:relative;height:26px;border-radius:8px;
    background-image:repeating-linear-gradient(90deg, transparent, transparent calc(100%/7 - 1px), var(--paper-line) calc(100%/7 - 1px), var(--paper-line) calc(100%/7));
  }
  .gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:6px;font-size:9.5px;color:#fff;display:flex;align-items:center;padding:0 5px;overflow:hidden;font-weight:600;}
  .gantt-bar.work{background:var(--work);}
  .gantt-bar.home{background:var(--home);}
  .gantt-bar.unscheduled{background:repeating-linear-gradient(45deg, #E7E1EF, #E7E1EF 5px, #D9D1E4 5px, #D9D1E4 10px);color:var(--text-mid);}
  .gantt-deadline{position:absolute;top:-2px;bottom:-2px;width:0;border-right:2px dashed var(--danger);}
  .gantt-note{margin-top:10px;font-size:11.5px;color:var(--text-mid);}

  footer.note{text-align:center;color:var(--text-light);font-size:11px;margin-top:30px;}

  @media(max-width:520px){
    .app-header{padding:22px 18px;margin:12px 12px 0;border-radius:20px;}
    .container{padding:16px 14px 4px;}
    .card{padding:18px 16px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============ CONSTANTS ============ */
const DAY_SHORT = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const DAY_FULL  = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const SLOTS = 48;
const ROWH = 12;

/* ============ STATE ============ */
let state = {
  constraints: [
    {id:1, name:'שעות עבודה', type:'עבודה', days:[0,1,2,3,4], start:'09:00', end:'18:00'},
    {id:2, name:'ערב בבית', type:'בית', days:[0,1,2,3,4], start:'19:00', end:'22:30'},
    {id:3, name:'סוף שבוע (בית)', type:'בית', days:[5,6], start:'08:30', end:'22:00'},
    {id:4, name:'שינה', type:'שינה', days:[0,1,2,3,4,5,6], start:'23:30', end:'07:00'},
    {id:5, name:'חדר כושר', type:'חסום', days:[1,3], start:'18:00', end:'19:00'},
  ],
  tasks: [
    {id:1, name:'הכנת מצגת רבעונית', category:'עבודה', duration:3, priority:'גבוהה', deadlineDay:3},
    {id:2, name:'סקירת קוד לצוות', category:'עבודה', duration:1.5, priority:'בינונית', deadlineDay:4},
    {id:3, name:'תכנון תקציב משפחתי', category:'בית', duration:1, priority:'גבוהה', deadlineDay:2},
    {id:4, name:'לימוד קורס אונליין', category:'עבודה', duration:2, priority:'בינונית', deadlineDay:6},
    {id:5, name:'סידור וניקיון הבית', category:'בית', duration:2, priority:'נמוכה', deadlineDay:6},
    {id:6, name:'זמן איכות עם המשפחה', category:'בית', duration:3, priority:'גבוהה', deadlineDay:6},
  ],
  nextConstraintId: 6,
  nextTaskId: 7,
  step: 1,
  constraintFormOpen: false,
  taskFormOpen: false,
  resultsTab: 'calendar',
  result: null,
  cError: '',
  tError: '',
};

/* ============ TIME HELPERS ============ */
function timeToSlot(t){
  const [h,m] = t.split(':').map(Number);
  return Math.round((h*60+m)/30);
}
function applyRange(dayArr, startStr, endStr, fn){
  let s = timeToSlot(startStr), e = timeToSlot(endStr);
  s = Math.max(0, Math.min(SLOTS, s));
  e = Math.max(0, Math.min(SLOTS, e));
  if(e > s){
    for(let i=s;i<e;i++) fn(dayArr[i]);
  } else {
    for(let i=s;i<SLOTS;i++) fn(dayArr[i]);
    for(let i=0;i<e;i++) fn(dayArr[i]);
  }
}

/* ============ SCHEDULING ENGINE (unchanged logic) ============ */
function buildGrid(constraints){
  const grid = [];
  for(let d=0; d<7; d++){
    grid.push(Array.from({length:SLOTS}, () => ({window:null, blocked:false, taskId:null})));
  }
  constraints.filter(c => c.type==='עבודה' || c.type==='בית').forEach(c=>{
    c.days.forEach(d=>{
      applyRange(grid[d], c.start, c.end, cell => { cell.window = c.type; });
    });
  });
  constraints.filter(c => c.type==='חסום' || c.type==='שינה').forEach(c=>{
    c.days.forEach(d=>{
      applyRange(grid[d], c.start, c.end, cell => { cell.blocked = true; });
    });
  });
  return grid;
}
function findFullFit(grid, windowType, neededSlots, maxDay){
  for(let d=0; d<=maxDay; d++){
    let s = 0;
    while(s + neededSlots <= SLOTS){
      let ok = true;
      for(let i=0;i<neededSlots;i++){
        const c = grid[d][s+i];
        if(c.window!==windowType || c.blocked || c.taskId!==null){ ok=false; break; }
      }
      if(ok) return {day:d, start:s, len:neededSlots};
      s++;
    }
  }
  return null;
}
function findLargestRunEarliest(grid, windowType, maxDay){
  for(let d=0; d<=maxDay; d++){
    let best = null;
    let s = 0;
    while(s < SLOTS){
      const c = grid[d][s];
      if(c.window===windowType && !c.blocked && c.taskId===null){
        const runStart = s;
        while(s < SLOTS){
          const cc = grid[d][s];
          if(cc.window===windowType && !cc.blocked && cc.taskId===null) s++;
          else break;
        }
        const runLen = s - runStart;
        if(!best || runLen > best.len) best = {day:d, start:runStart, len:runLen};
      } else {
        s++;
      }
    }
    if(best && best.len>0) return best;
  }
  return null;
}
function scheduleTasks(constraints, tasks){
  const grid = buildGrid(constraints);
  const prioRank = {'גבוהה':0,'בינונית':1,'נמוכה':2};
  const sorted = [...tasks].sort((a,b)=>{
    if(prioRank[a.priority] !== prioRank[b.priority]) return prioRank[a.priority]-prioRank[b.priority];
    const da = a.deadlineDay==null ? 6 : a.deadlineDay;
    const db = b.deadlineDay==null ? 6 : b.deadlineDay;
    if(da !== db) return da-db;
    return b.duration - a.duration;
  });
  const assignments = [];
  const unscheduled = [];
  sorted.forEach(task=>{
    const windowType = task.category;
    const maxDay = task.deadlineDay==null ? 6 : task.deadlineDay;
    let remaining = Math.round(task.duration*2);
    const originalNeeded = remaining;
    const full = findFullFit(grid, windowType, remaining, maxDay);
    if(full){
      for(let i=0;i<full.len;i++) grid[full.day][full.start+i].taskId = task.id;
      assignments.push({taskId:task.id, day:full.day, startSlot:full.start, endSlot:full.start+full.len});
      remaining = 0;
    } else {
      let attempts = 0;
      while(remaining > 0 && attempts < 4){
        attempts++;
        const run = findLargestRunEarliest(grid, windowType, maxDay);
        if(!run || run.len===0) break;
        const take = Math.min(remaining, run.len);
        for(let i=0;i<take;i++) grid[run.day][run.start+i].taskId = task.id;
        assignments.push({taskId:task.id, day:run.day, startSlot:run.start, endSlot:run.start+take});
        remaining -= take;
      }
    }
    if(remaining > 0){
      unscheduled.push({task, missingHours: remaining/2, totalHours: originalNeeded/2});
    }
  });
  return {grid, assignments, unscheduled};
}

/* ============ SUMMARY HELPERS ============ */
function sumConstraintHours(type){
  return state.constraints.filter(c=>c.type===type).reduce((sum,c)=>{
    let s=timeToSlot(c.start), e=timeToSlot(c.end);
    let slotsPer = e>s ? (e-s) : (SLOTS-s+e);
    return sum + slotsPer*c.days.length*0.5;
  },0);
}
function sumTaskHours(category){
  return state.tasks.filter(t=>t.category===category).reduce((s,t)=>s+t.duration,0);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============ STEP 3: RESULTS ============ */
function getRuns(dayGrid, valueFn){
  const runs = [];
  let cur = null;
  for(let s=0;s<SLOTS;s++){
    const v = valueFn(dayGrid[s]);
    if(cur && cur.value===v){ cur.end = s+1; }
    else { if(cur) runs.push(cur); cur = {start:s, end:s+1, value:v}; }
  }
  if(cur) runs.push(cur);
  return runs.filter(r => r.value !== null && r.value !== undefined && r.value !== false);
}

function renderCalendar(grid){
  const dayOrder = [0,1,2,3,4,5,6];
  const headCells = dayOrder.map(d => `<div class="d">${DAY_FULL[d]}</div>`).join('') + `<div class="d"></div>`;

  const dayCols = dayOrder.map(d=>{
    const underlay = getRuns(grid[d], c => c.blocked ? 'blocked' : (c.window || null));
    const overlay = getRuns(grid[d], c => c.taskId);

    const underlayHtml = underlay.map(r=>{
      const top = r.start*ROWH, height=(r.end-r.start)*ROWH;
      let cls = 'block ';
      if(r.value==='blocked'){ cls+='block-blocked'; }
      else if(r.value==='עבודה'){ cls+='block-work-window'; }
      else if(r.value==='בית'){ cls+='block-home-window'; }
      return `<div class="${cls}" style="top:${top}px;height:${height}px;"></div>`;
    }).join('');

    const overlayHtml = overlay.map(r=>{
      const task = state.tasks.find(t=>t.id===r.value);
      if(!task) return '';
      const top = r.start*ROWH, height=(r.end-r.start)*ROWH;
      const catClass = task.category==='עבודה' ? 'work' : 'home';
      return `<div class="block block-task ${catClass}" style="top:${top}px;height:${height}px;" title="${escapeHtml(task.name)}">${escapeHtml(task.name)}</div>`;
    }).join('');

    return `<div class="day-col" style="height:${SLOTS*ROWH}px;">${underlayHtml}${overlayHtml}</div>`;
  }).join('');

  const hourLines = Array.from({length:24}, (_,h)=>`<div class="hour-line" style="top:${h*2*ROWH}px;"></div>`).join('');
  const axisLabels = Array.from({length:24}, (_,h)=>`<div class="axis-label" style="top:${h*2*ROWH}px;">${String(h).padStart(2,'0')}:00</div>`).join('');

  return `
    <div class="cal-scroll" id="cal-scroll">
      <div class="cal-head">${headCells}</div>
      <div class="cal-grid">
        ${dayCols}
        <div class="axis-col" style="height:${SLOTS*ROWH}px;">${hourLines}${axisLabels}</div>
      </div>
    </div>
  `;
}

function renderGantt(assignments){
  const dayWidth = 100/7;
  const rows = state.tasks.map(task=>{
    const catClass = task.category==='עבודה' ? 'work' : 'home';
    const taskAssignments = assignments.filter(a=>a.taskId===task.id);
    const isUnscheduled = taskAssignments.length===0;

    let bars = '';
    if(isUnscheduled){
      bars = `<div class="gantt-bar unscheduled" style="right:0;left:0;">לא שובץ</div>`;
    } else {
      bars = taskAssignments.map(a=>{
        const rightPct = a.day*dayWidth + (a.startSlot/SLOTS)*dayWidth;
        const widthPct = ((a.endSlot-a.startSlot)/SLOTS)*dayWidth;
        return `<div class="gantt-bar ${catClass}" style="right:${rightPct}%;width:${widthPct}%;" title="${escapeHtml(task.name)}">${escapeHtml(task.name)}</div>`;
      }).join('');
    }

    let deadlineMark = '';
    if(task.deadlineDay!=null){
      const markRight = (task.deadlineDay+1)*dayWidth;
      deadlineMark = `<div class="gantt-deadline" style="right:${markRight}%;"></div>`;
    }

    return `<div class="gantt-row">
      <div class="gantt-label"><span class="dot" style="background:var(--${catClass})"></span>${escapeHtml(task.name)}</div>
      <div class="gantt-track">${bars}${deadlineMark}</div>
    </div>`;
  }).join('');

  const dayLabels = [0,1,2,3,4,5,6].map(d=>`<span>${DAY_SHORT[d]}</span>`).join('');

  return `
    <div class="gantt">
      <div class="gantt-head"><div></div><div class="gantt-daylabels">${dayLabels}</div></div>
      ${rows}
      <div class="gantt-note">קו מקווקו אדום = דדליין המשימה</div>
    </div>
  `;
}

function renderStep3(){
  if(!state.result){
    return `
      <div class="card step-panel">
        <div class="empty-state">
          <div class="glyph">◷</div>
          <p>נדרשים גם מסגרת וגם משימות כדי לחשב את השבוע הממוקסם.</p>

          </div>

    `;
  }

  const {grid, assignments, unscheduled} = state.result;
  let workScheduled=0, homeScheduled=0, blockedTotal=0;
  for(let d=0;d<7;d++){
    for(let s=0;s<SLOTS;s++){
      const cell = grid[d][s];
      if(cell.blocked) blockedTotal += 0.5;
      else if(cell.taskId!==null){
        const task = state.tasks.find(t=>t.id===cell.taskId);
        if(task && task.category==='עבודה') workScheduled += 0.5;
        else if(task && task.category==='בית') homeScheduled += 0.5;
      }
    }
  }
  const total = 168;
  const freeTotal = Math.max(0, total - workScheduled - homeScheduled - blockedTotal);
  const p1 = (workScheduled/total*100);
  const p2 = p1 + (homeScheduled/total*100);
  const p3 = p2 + (blockedTotal/total*100);

  const unscheduledHtml = unscheduled.length ? `
    <div class="unscheduled-warn">
      <strong>⚠ ${unscheduled.length} משימות לא נכנסו במלואן לזמן הפנוי</strong>
      ${unscheduled.map(u=>`${escapeHtml(u.task.name)} — חסרות עוד ${u.missingHours} שעות`).join('<br>')}
    </div>` : '';

  return `
    <div class="step-panel">
      <div class="back-link"><button class="btn-ghost" onclick="setStep(2)">⟵ חזרה לעריכה</button></div>
      <div class="hero-panel">
        <div class="dial-wrap">
          <div class="dial" style="background:conic-gradient(var(--work) 0% ${p1}%, var(--home) ${p1}% ${p2}%, var(--blocked) ${p2}% ${p3}%, var(--free) ${p3}% 100%);">
            <div class="dial-hole">
              <div class="num">${Math.round(freeTotal)}</div>
              <div class="lbl">שעות פנויות<br>מתוך 168 השבוע</div>
            </div>
          </div>
        </div>
        <div class="hero-text">
          <h3>השבוע שלך, ממוקסם</h3>
          <p>${Math.round(workScheduled)} שעות עבודה ו-${Math.round(homeScheduled)} שעות בית שובצו בתוך המסגרת שהגדרת. השאר — ${Math.round(freeTotal)} שעות — נשאר פנוי באמת.</p>
          <div class="legend">
            <div class="li"><span class="dot" style="background:var(--work)"></span>עבודה משובצת</div>
            <div class="li"><span class="dot" style="background:var(--home)"></span>בית משובץ</div>
            <div class="li"><span class="dot" style="background:var(--blocked)"></span>חסום / שינה</div>
            <div class="li"><span class="dot" style="background:var(--free)"></span>פנוי</div>
          </div>
        </div>
      </div>

      ${unscheduledHtml}

      <div class="tabs">
        <button class="tab-btn ${state.resultsTab==='calendar'?'active':''}" onclick="setResultsTab('calendar')">לוח שבועי</button>
        <button class="tab-btn ${state.resultsTab==='gantt'?'active':''}" onclick="setResultsTab('gantt')">ציר זמן (גאנט)</button>
      </div>

      ${state.resultsTab==='calendar' ? renderCalendar(grid) : renderGantt(assignments)}
    </div>
  `;
}

/* ============ ACTIONS ============ */
function selectPill(el){
  const parent = el.parentElement;
  parent.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
}
function toggleDayChip(el){
  el.classList.toggle('active');
}
function selectSingleDayChip(el){
  const parent = el.parentElement;
  parent.querySelectorAll('.day-chip').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
}
function getSelectedDays(containerId){
  return Array.from(document.getElementById(containerId).querySelectorAll('.day-chip.active')).map(el => Number(el.dataset.day));
}
function getActivePillValue(containerId){
  const c = document.getElementById(containerId);
  const active = c.querySelector('.pill.active');
  return active ? active.dataset.value : null;
}

function addConstraint(){
  const name = document.getElementById('c-name').value.trim();
  const type = getActivePillValue('c-type-group');
  const start = document.getElementById('c-start').value;
  const end = document.getElementById('c-end').value;
  const days = getSelectedDays('c-days');
  if(!name){ state.cError='נא לתת שם לבלוק.'; render(); return; }
  if(days.length===0){ state.cError='נא לבחור לפחות יום אחד.'; render(); return; }
  if(!start || !end){ state.cError='נא לבחור שעות התחלה וסיום.'; render(); return; }
  state.cError = '';
  state.constraints.push({id: state.nextConstraintId++, name, type, days, start, end});
  state.result = null;
  state.constraintFormOpen = true;
  render();
  const nameEl = document.getElementById('c-name');
  if(nameEl){ nameEl.value=''; nameEl.focus(); }
}
function removeConstraint(id){
  state.constraints = state.constraints.filter(c=>c.id!==id);
  state.result = null;
  render();
}

function addTask(){
  const name = document.getElementById('t-name').value.trim();
  const category = getActivePillValue('t-category-group');
  const duration = parseFloat(document.getElementById('t-duration').value);
  const priority = getActivePillValue('t-priority-group');
  const deadlineGroup = document.getElementById('t-deadline-group');
  const activeDeadline = deadlineGroup.querySelector('.day-chip.active');
  const deadlineDay = (!activeDeadline || activeDeadline.dataset.day==='none') ? null : Number(activeDeadline.dataset.day);
  if(!name){ state.tError='נא לתת שם למשימה.'; render(); return; }
  if(!duration || duration<=0){ state.tError='נא להזין משך תקין (גדול מ-0).'; render(); return; }
  state.tError = '';
  state.tasks.push({id: state.nextTaskId++, name, category, duration, priority, deadlineDay});
  state.result = null;
  state.taskFormOpen = true;
  render();
  const nameEl = document.getElementById('t-name');
  if(nameEl){ nameEl.value=''; nameEl.focus(); }
}
function removeTask(id){
  state.tasks = state.tasks.filter(t=>t.id!==id);
  state.result = null;
  render();
}

function setStep(n){
  state.step = n;
  if(n===3){
    if(state.constraints.length && state.tasks.length){
      state.result = scheduleTasks(state.constraints, state.tasks);
    } else {
      state.result = null;
    }
  }
  render();
  window.scrollTo({top:0, behavior:'smooth'});
  if(n===3){
    setTimeout(()=>{
      const cal = document.getElementById('cal-scroll');
      if(cal) cal.scrollTop = 6*2*ROWH;
    }, 30);
  }
}
function setResultsTab(tab){
  state.resultsTab = tab;
  render();
}

/* ============ ROOT RENDER ============ */
function renderStepper(){
  const steps = [
    {n:1, label:'מסגרת', done: state.constraints.length>0},
    {n:2, label:'משימות', done: state.tasks.length>0},
    {n:3, label:'תוצאה', done: !!state.result},
  ];
  return `<div class="stepper">
    ${steps.map(s=>`
      <div class="step-tab ${state.step===s.n?'active':''} ${s.done && state.step!==s.n?'done':''}" onclick="setStep(${s.n})">
        <span class="num">${s.done && state.step!==s.n ? '✓' : s.n}</span>${s.label}
      </div>
    `).join('')}
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  let stepHtml = '';
  if(state.step===1) stepHtml = renderStep1();
  else if(state.step===2) stepHtml = renderStep2();
  else stepHtml = renderStep3();

  app.innerHTML = `
    <div class="app-header">
      <div class="eyebrow">מתכנן זמן חכם</div>
      <h1>משבצת</h1>
      <p>הגדר את גבולות הגזרה שלך, ותן למשבצת לשבץ את המשימות כך שתמקסם כל שעה — גם בעבודה וגם בבית.</p>
    </div>
    <div class="container">
      ${renderStepper()}
      ${stepHtml}
    </div>
    <footer class="note">כל הנתונים נשמרים רק בזיכרון הדפדפן במהלך השימוש הנוכחי.</footer>
  `;
}

render();
</script>
</body>
</html>
